name: .Net Build TrimItEasy

on:
  push:
    paths: 
      - 'src/**'
  pull_request:
    paths: 
      - 'src/**'
  workflow_dispatch:
  
jobs:
  build:

    defaults: 
      run:
        working-directory: src
        
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
  
    - name: Setup .NET Core
      uses: actions/setup-dotnet@v1
      with:
        dotnet-version: 10.0.100

    - name: Test
      run: dotnet test TrimItEasy.Tests/TrimItEasy.Tests.csproj /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura

    - name: Build
      run: dotnet build --configuration Release 

    - name: Upload TrimItEasy
      uses: actions/upload-artifact@v4
      with:
        name: TrimItEasy
        path: src/TrimItEasy/bin/Release/*.nupkg

    - name: Upload TrimItEasy.Generators
      uses: actions/upload-artifact@v4
      with:
        name: TrimItEasy.Generators
        path: src/TrimItEasy.Generators/bin/Release/*.nupkg
        
    - name: Publish TrimItEasy to NuGet
      if: startsWith(github.ref, 'refs/tags/releases/v')
      run: |
        dotnet nuget push "src/TrimItEasy/bin/Release/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

    - name: Publish TrimItEasy.Generators to NuGet
      if: startsWith(github.ref, 'refs/tags/releases/v')
      run: |
        dotnet nuget push "src/TrimItEasy.Generators/bin/Release/*.nupkg" \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate

